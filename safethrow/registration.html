<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration | Safethrow</title>
    <link rel="stylesheet" href="/css/total-style.css">
    <link rel="stylesheet" href="/css/reg-style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="reg-container">
        <div class="noise"></div>
        <div class="reg-grid">
            <div class="reg-blank-flex-reserve">
                <div class="reg-blank">
                    <div class="reg-blank-inner-blocks-flex">
                        <div class="reg-blank-logo"><img style="width: 25px; height: 25px;" src="/img/Add Male User Group.png" alt=""></div>
                        <div class="reg-blank-name"><span style="font-size: 23px; color: white; font-weight: 600; line-height: 25px;">Регистрация в системе Safethrow</span></div>
                        <div class="reg-blank-desc"><span>Safethrow предоставляет приватное и надежное файловое хранилище, поддерживающее фукцию шифрования документов и создания электронных подписей, а также генерации сертификатов и ключей</span></div>
                        <form class="reg-input-flex" action="">
                            <div class="reg-login-box reg-boxes">
                                <input class="reg-input-area" id="reg-login" type="text">
                                <label class="reg-labels" for="reg-login">Логин</label>
                            </div>
                            <div class="reg-mail-box reg-boxes">
                                <input class="reg-input-area" id="reg-mail" type="text">
                                <label class="reg-labels" for="reg-mail">Почта</label>
                            </div>
                            <div class="reg-name-box reg-boxes">
                                <input class="reg-input-area" id="reg-name" type="text">
                                <label class="reg-labels" for="reg-name">Название организации</label>
                            </div>
                            <div class="reg-checkbox-flex">
                                <input id="reg-blank-agree" type="checkbox"></input>
                                <label for="reg-blank-agree">Я принимаю пользовательское соглашение</label>
                            </div>
                            <div class="reg-blank-buttons-flex">
                                <button class="reg-blank-button-next"></button>
                                <button class="reg-blank-button-prev"></button>
                            </div>
                        </form>
                        <div class="reg-blank-already"><span>Уже есть аккаунт? <a style="text-decoration: none;" href="">Войти</a></span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
