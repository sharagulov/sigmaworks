<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safethrow | reggn-in</title>
  <link rel="stylesheet" href="/css/total-style.css">
  <link rel="stylesheet" href="/css/index-style.css">
  <link rel="stylesheet" href="/css/reg-style.css">
</head>
<body>
  <div class="container">
    <div class="noise"></div>
    <div class="background-container"></div>
    <div class="reg-contents">
      <div class="reg-contents-flex">
        <div class="reg-h1">
          <div class="reg-h1-flex">
            <span class="reg-reg-span big-reg-text">Регистрация</span>
            <p class="reg-comm-reg-p small-reg-text" style="padding-top: 5px;">Заполните регистрационную форму</p>
          </div>
        </div>
        <div class="reg-h2">
          <div class="reg-h2-flex">
            <div class="div1-reg-form-text"><input type="text" name="name" placeholder="Нrазвание организации" class="reg-form-text"></input><hr></div>
            <div class="div2-reg-form-text"><input type="text" name="name" placeholder="ОГРН" class="reg-form-text"></input><hr></div>
            <div class="div3-reg-form-text"><input type="text" name="name" placeholder="Электронная почта" class="reg-form-text"></input><hr></div>
            <div class="div4-reg-form-text"><input type="text" name="name" placeholder="Фактический адрес" class="reg-form-text"></input><hr></div>
            <div class="div5-reg-form-text"><input type="text" name="name" placeholder="Имя управляющего" class="reg-form-text"></input><hr></div>
            
            
           
           
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
