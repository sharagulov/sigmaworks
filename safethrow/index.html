<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello</title>
  <link rel="stylesheet" href="/css/total-syle.css">
  <link rel="stylesheet" href="/css/GM-style.css">
</head>
<body>
  <div class="container">
    <div class="background-container">
      <div class="rad1 raddiv radpurple"></div>
      <div class="rad2 raddiv radblue"></div>
      <div class="rad3 raddiv"></div>
      <div class="rad4 raddiv"></div>
      <div class="rad5 raddiv"></div>
    </div>
    <div class="header-main">
      <header class="header-main-flex">
        <div class="header-triple-flex">
          <section class="left-header-cont header-cont">
            <div style="gap: 2px;" class="left-box-flex box-flexes side-box-flex">
              <img style="width: 34px; height: 34px;" src="img/Asset 45 1.png" alt="">
              <span style="opacity: 100%; ">Safethrow</span>
            </div>
          </section>
          <section class="center-header-cont header-cont">
            <div class="center-box-flex box-flexes non-logo-box-flex">
              <span>Главная</span>
              <span>О нас</span>
              <span>Библиотека</span>
              <span>Отправка</span>
            </div>
          </section>
          <section class="right-header-cont header-cont ">
            <div style="justify-content: flex-end;" class="right-box-flex box-flexes non-logo-box-flex side-box-flex">
              <span>Вход</span>
              <span>Регистрация</span>
            </div>
          </section>
        </div>
      </header>
    </div>
    <div class="contents">
      <div class="cont-half1">
        <div class="cont-half1-flex">
          <div style="width: fit-content;" class="half1-half1">
            <div>Safethrow — новый</div>
            <div style="position: relative;">сервис для хранения данных</div>
          </div>
          <div style="width: fit-content; padding-top: 25px;" class="half1-half2">
            <div class="h1h2-flex">
              <div class="h1h2-f1 h1h2-span">проект студенческой команды</div>
              <div class="h1h2-f2 h1h2-span">инновационная библиотека</div>
            </div>
          </div>
          <div class="half1-half3" style="width: fit-content; padding-top: 30px;">
            <span class="h1h3-span">Регистрация</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
